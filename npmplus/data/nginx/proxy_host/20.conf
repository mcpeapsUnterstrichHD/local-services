# ----------------------------------------------------------------------
# stirling-pdf.localhost, stirling-pdf.comboompunktsucht.app, stirling-pdf.mcpeapsunterstrichhd.dev
# DO NOT EDIT THIS FILE DIRECTLY, CHANGES WILL BE LOST WHEN UPDATING!
# ----------------------------------------------------------------------

upstream upstream_20 {
  zone upstream_20 128k;
  server localhost:8080 resolve;
}


server {
  server_name stirling-pdf.localhost stirling-pdf.comboompunktsucht.app stirling-pdf.mcpeapsunterstrichhd.dev;

  listen unix:/run/nginx.sock;


  listen 0.0.0.0:80;
  listen [::]:80;


  listen 0.0.0.0:443 ssl;
  listen [::]:443 ssl;


  listen 0.0.0.0:443 quic;
  listen [::]:443 quic;


  # Custom TLS
  ssl_certificate /data/tls/custom/npm-3/fullchain.pem;
  ssl_certificate_key /data/tls/custom/npm-3/privkey.pem;


  if ($scheme = "http") {
    return 301 https://$host$is_request_port$request_port$request_uri;
  }
  if ($http_x_forwarded_proto = "http") {
    return 301 https://$host$is_request_port$request_port$request_uri;
  }


  location /.well-known/acme-challenge/ {
    root /data/tls/certbot/acme-challenge;
    fancyindex off;
    index off;
    allow all;
    auth_basic off;
    auth_request off;
  }


  location / {


    more_set_headers "X-Frame-Options: SAMEORIGIN";


    include proxy-headers.conf;
    proxy_set_header Accept-Encoding "";


    proxy_pass http://upstream_20$request_uri;


  }


  # custom locations
  # Custom
  include /data/custom_nginx/server_http.conf;
  include /data/custom_nginx/server_proxy.conf;
}

