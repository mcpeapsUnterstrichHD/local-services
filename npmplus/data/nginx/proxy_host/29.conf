# ----------------------------------------------------------------------
# termix.localhost, termix.mcpeapsunterstrichhd.dev
# DO NOT EDIT THIS FILE DIRECTLY, CHANGES WILL BE LOST WHEN UPDATING!
# ----------------------------------------------------------------------

server {
    server_name termix.localhost termix.mcpeapsunterstrichhd.dev;

    listen unix:/run/nginx.sock;


    listen 0.0.0.0:80;
    listen [::]:80;


    listen 0.0.0.0:443 ssl;
    listen [::]:443 ssl;


    listen 0.0.0.0:443 quic;
    listen [::]:443 quic;


    # Custom TLS
    ssl_certificate /data/tls/custom/npm-3/fullchain.pem;
    ssl_certificate_key /data/tls/custom/npm-3/privkey.pem;


    if ($scheme = "http") {
        return 301 https://$host$is_request_port$request_port$request_uri;
    }
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$is_request_port$request_port$request_uri;
    }


    more_set_headers "Strict-Transport-Security: $hsts_includeSubDomains_header";


    location /.well-known/acme-challenge/ {
        root /data/tls/certbot/acme-challenge;
        fancyindex off;
        index off;
        allow all;
        auth_basic off;
        auth_request off;
    }


    # Authorization
    auth_basic "basic access authentication required";
    auth_basic_user_file /data/access/4;


    # Access Rules: 0 total
    deny all;
    # Access checks must...

    satisfy any;


    location / {


        more_set_headers "X-Frame-Options: SAMEORIGIN";


        set $upstream localhost;
        include proxy-headers.conf;
        proxy_set_header Accept-Encoding "";


        proxy_pass http://$upstream:8099$request_uri;


    }


    # custom locations
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Custom
    include /data/custom_nginx/server_http.conf;
    include /data/custom_nginx/server_proxy.conf;
}

